# ===== NGINX Configuration for Socket.IO + React Chat Application =====
# 
# Production-grade configuration for:
# - Frontend: https://chat.myana.site
# - Backend API + WebSocket: https://api.chat.myana.site
#
# CRITICAL FIX: Proper WebSocket proxying with correct headers and timeouts
#

# ===== CRITICAL FIX 29: Upstream backend with keepalive =====
upstream chat_backend {
    server localhost:5000;
    keepalive 64;           # Keep connections alive for better performance
}

# ===== CRITICAL FIX 30: Frontend server =====
server {
    listen 80;
    listen [::]:80;
    server_name chat.myana.site www.chat.myana.site;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.myana.site www.chat.myana.site;

    # SSL Configuration
    ssl_certificate /path/to/ssl/chat.myana.site/fullchain.pem;
    ssl_certificate_key /path/to/ssl/chat.myana.site/privatekey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Frontend assets
    root /var/www/chat-frontend/dist;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Don't cache index.html itself
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, max-age=0";
    }
}

# ===== CRITICAL FIX 31: Backend API server =====
server {
    listen 80;
    listen [::]:80;
    server_name api.chat.myana.site;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.chat.myana.site;

    # SSL Configuration
    ssl_certificate /path/to/ssl/api.chat.myana.site/fullchain.pem;
    ssl_certificate_key /path/to/ssl/api.chat.myana.site/privatekey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_BACKEND:50m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers for frontend
    add_header Access-Control-Allow-Origin "https://chat.myana.site" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-device-fingerprint, X-Requested-With, Accept, Origin" always;
    add_header Access-Control-Max-Age "86400" always;

    # ===== CRITICAL FIX 32: Handle preflight OPTIONS requests =====
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ===== CRITICAL FIX 33: Socket.IO WebSocket endpoint =====
    location /socket.io/ {
        proxy_pass http://chat_backend;

        # ===== CRITICAL FIX 34: HTTP/1.1 for WebSocket upgrade =====
        proxy_http_version 1.1;

        # ===== CRITICAL FIX 35: Connection upgrade headers (MUST HAVE for WebSocket) =====
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ===== CRITICAL FIX 36: Host and origin headers =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # ===== CRITICAL FIX 37: NO BUFFERING for WebSocket =====
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # ===== CRITICAL FIX 38: Keepalive connection settings =====
        proxy_set_header Connection "";        # Clear Connection header for keep-alive
        proxy_connect_timeout 7d;              # 7 days for WebSocket connection
        proxy_send_timeout 7d;                 # Very high for persistent connections
        proxy_read_timeout 7d;                 # Very high for persistent connections

        # ===== CRITICAL FIX 39: Disable proxy response timeout =====
        proxy_pass_request_headers on;

        # ===== CRITICAL FIX 40: Buffer configuration =====
        client_body_buffer_size 128k;
        client_max_body_size 5M;

        # ===== CRITICAL FIX 41: WebSocket specific settings =====
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;

        # Enable websocket
        proxy_http_version 1.1;
    }

    # ===== CRITICAL FIX 42: Standard REST API endpoints =====
    location /api/ {
        proxy_pass http://chat_backend;
        proxy_http_version 1.1;

        # Basic proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # ===== CRITICAL FIX 43: Allow upgrade to WebSocket for /api route =====
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard API timeouts (shorter than WebSocket)
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering for API responses is OK
        proxy_buffering on;
        client_max_body_size 5M;
    }

    # ===== CRITICAL FIX 44: Health check endpoint =====
    location /healthz {
        access_log off;
        proxy_pass http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===== CRITICAL FIX 45: Socket status endpoint =====
    location /socket-status {
        access_log off;
        proxy_pass http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===== CRITICAL FIX 46: Default deny unknown routes =====
    location / {
        return 404;
    }
}

# ===== CRITICAL FIX 47: Rate limiting =====
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=socket_limit:10m rate=60r/s;

# Apply rate limiting to API (not strict for WebSocket)
# This is handled per-route in the server block above
